apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging-service
  namespace: groupsapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: messaging-service
  template:
    metadata:
      labels:
        app: messaging-service
    spec:
      containers:
        - name: messaging-service
          image: groupsapp/messaging-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: DB_HOST
              value: postgres
            - name: DB_NAME
              value: groupsapp_messaging
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: groupsapp-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: groupsapp-secrets
                  key: JWT_SECRET
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: NODE_ENV
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: KAFKA_BROKERS
            - name: GROUPS_SERVICE_GRPC
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: GROUPS_SERVICE_GRPC
            - name: CONSUL_HOST
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: CONSUL_HOST
            - name: SERVICE_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: messaging-service
  namespace: groupsapp
spec:
  selector:
    app: messaging-service
  ports:
    - name: http
      port: 3003
      targetPort: 3003
