apiVersion: apps/v1
kind: Deployment
metadata:
  name: files-service
  namespace: groupsapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: files-service
  template:
    metadata:
      labels:
        app: files-service
    spec:
      containers:
        - name: files-service
          image: groupsapp/files-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3005
          env:
            - name: PORT
              value: "3005"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: groupsapp-secrets
                  key: JWT_SECRET
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: NODE_ENV
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: AWS_REGION
            - name: AWS_S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: AWS_S3_BUCKET
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: groupsapp-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: groupsapp-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: CONSUL_HOST
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: CONSUL_HOST
            - name: SERVICE_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3005
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: files-service
  namespace: groupsapp
spec:
  selector:
    app: files-service
  ports:
    - name: http
      port: 3005
      targetPort: 3005
