---
# Shared PostgreSQL instance with multiple databases
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: groupsapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: groupsapp-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_MULTIPLE_DATABASES
              value: "groupsapp_auth,groupsapp_groups,groupsapp_messaging"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          emptyDir: {}
        - name: init-scripts
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: groupsapp
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: groupsapp
spec:
  storageClassName: gp2-csi
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# Init script to create multiple databases
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: groupsapp
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
      CREATE DATABASE groupsapp_auth;
      CREATE DATABASE groupsapp_groups;
      CREATE DATABASE groupsapp_messaging;
    EOSQL
