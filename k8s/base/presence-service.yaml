apiVersion: apps/v1
kind: Deployment
metadata:
  name: presence-service
  namespace: groupsapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: presence-service
  template:
    metadata:
      labels:
        app: presence-service
    spec:
      containers:
        - name: presence-service
          image: groupsapp/presence-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: groupsapp-secrets
                  key: JWT_SECRET
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: NODE_ENV
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: REDIS_PORT
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: KAFKA_BROKERS
            - name: CONSUL_HOST
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: CONSUL_HOST
            - name: SERVICE_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: presence-service
  namespace: groupsapp
spec:
  selector:
    app: presence-service
  ports:
    - name: http
      port: 3004
      targetPort: 3004
