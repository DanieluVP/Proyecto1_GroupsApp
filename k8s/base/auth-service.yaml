apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: groupsapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: groupsapp/auth-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
            - name: grpc
              containerPort: 5001
          env:
            - name: PORT
              value: "3001"
            - name: GRPC_PORT
              value: "5001"
            - name: DB_HOST
              value: postgres
            - name: DB_NAME
              value: groupsapp_auth
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: groupsapp-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: groupsapp-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: JWT_EXPIRES_IN
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: NODE_ENV
            - name: CONSUL_HOST
              valueFrom:
                configMapKeyRef:
                  name: groupsapp-config
                  key: CONSUL_HOST
            - name: SERVICE_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: groupsapp
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 3001
      targetPort: 3001
    - name: grpc
      port: 5001
      targetPort: 5001
